name: CI/CD to Kubernetes

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Upgraded to the official, more secure Docker action
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push all 3 services
      - name: Build and Push Images
        run: |
          docker build -t yash4200/insurance-backend:latest ./backend
          docker push yash4200/insurance-backend:latest
          
          docker build -t yash4200/insurance-frontend:latest ./frontend
          docker push yash4200/insurance-frontend:latest
          
          docker build -t yash4200/insurance-ai-service:latest ./ai-service
          docker push yash4200/insurance-ai-service:latest

      # Deploy to AWS K3s
      - name: Deploy to Kubernetes via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd InsureNow
            git pull origin main
            
            # CRITICAL: Tell GitHub Actions where K3s is
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            
            # Apply any YAML changes
            kubectl apply -f k8s/
            
            # Restart all 3 pods to pull the fresh images
            kubectl rollout restart deployment backend frontend ai-service
            
            # CRITICAL: Auto-clean old images so your EC2 doesn't crash!
            sudo k3s crictl rmi --prune